<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Background Petals -->
    <div class="bg-flowers" id="bg-flowers"></div>

    <!-- Hero Section -->
    <section class="hero reveal">
        <!-- Secret trigger is the heart icon -->
        <svg class="heart-icon" id="secret-trigger" viewBox="0 0 24 24" fill="none">
            <path opacity="1"
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                fill="#ff4d4d" />
        </svg>

        <h1 class="brand-font">Mohammed & Husaina</h1>
        <p class="quote">"You are my today, and all of my tomorrows."</p>
    </section>

    <!-- Timer Section -->
    <section class="timer-section reveal">
        <h2 class="brand-font">Our Forever Started On</h2>
        <div class="counter">
            <div class="time-box">
                <span id="days">0</span>
                <p>Days</p>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <p>Hours</p>
            </div>
            <div class="time-box">
                <span id="minutes">0</span>
                <p>Mins</p>
            </div>
        </div>
    </section>

    <!-- Photo Gallery Container -->
    <section class="gallery-container">
        <div id="loading" class="loader">Loading our memories...</div>
        <div class="photo-grid" id="photo-grid">
            <!-- Cards will be injected here via main.js -->
        </div>
    </section>

    <!-- Fullscreen Photo Viewer (Lightbox) -->
    <div class="lightbox-overlay" id="lightbox-overlay">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Fullscreen memory">
    </div>

    <footer class="brand-font reveal">Forever & Always ❤️</footer>

    <!-- Admin Floating Button -->
    <div class="admin-controls" id="admin-controls">
        <button class="btn btn-outline" id="btn-logout">Lock</button>
        <button class="btn" id="btn-add-memory">+ Add Memory</button>
    </div>

    <!-- Memory Modal (Upload / Edit) -->
    <div class="modal-overlay" id="memory-modal-overlay">
        <div class="modal" id="memory-modal">
            <h2 id="modal-title">Add New Memory</h2>

            <div class="form-group" id="file-group">
                <label>Choose Picture</label>
                <input type="file" id="memory-file" accept="image/*">
            </div>

            <div class="form-group">
                <label>Title (Optional)</label>
                <input type="text" id="memory-title" placeholder="E.g. Our First Date">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="memory-desc" rows="3" placeholder="Write something sweet..."></textarea>
            </div>

            <!-- Hidden field for edits -->
            <input type="hidden" id="memory-id">

            <div class="modal-actions">
                <button class="btn btn-outline" id="btn-cancel">Cancel</button>
                <button class="btn" id="btn-save">Save Memory</button>
            </div>
            <p id="modal-status" style="font-size: 0.8rem; text-align: right; margin-top: 10px; color: var(--gold);">
            </p>
        </div>
    </div>

    <!-- Load main script using Vite module entrypoint -->
    <script type="module" src="/main.js"></script>
</body>

</html>
